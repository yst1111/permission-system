server:
  port: 8080

spring:
  application:
    name: permission-system
  
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://172.22.128.1:3306/permission_system?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root
  
  sql:
    init:
      mode: never

  # Quartz配置
  quartz:
    job-store-type: memory
    properties:
      org:
        quartz:
          threadPool:
            threadCount: 10
          jobStore:
            class: org.quartz.simpl.RAMJobStore
  
  security:
    user:
      name: admin
      password: 123456

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.permission.entity
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: your-secret-key-here-make-it-long-and-secure
  expiration: 86400000  # 24小时

# SpringDoc OpenAPI 3 配置
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: alpha
  packages-to-scan: com.permission.controller

logging:
  level:
    com.permission: debug
    org.springframework.security: debug 